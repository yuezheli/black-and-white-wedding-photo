<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MyPortfolio</div>

                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

    <section id="home" class="hero">

        <p>I build clean and responsive websites.</p>

    <section id="about" class="container">
        <h2>About Me</h2>
        <p>This is a simple website layout to demonstrate HTML, CSS, and JavaScript. You can customize this text to say whatever you want!</p>
    </section>

    <footer>
        <p>&copy; 2024 My Simple Portfolio</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
